name: Sync Claude Code Docs Archive

on:
  workflow_dispatch:
  schedule:
    - cron: "42 * * * *"

permissions:
  contents: write

jobs:
  sync:
    uses: llms-txt-archive/llmstxt/.github/workflows/archive-sync.yml@main
    with:
      source_url: https://code.claude.com/docs/llms.txt
      site_name: Claude Code Docs
      site_url: https://code.claude.com
      repo_title: Claude Code Docs Archive
      schedule_label: Hourly at :42 UTC
      tool_ref: main
    secrets: inherit
